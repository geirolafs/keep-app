# Workaround: Apple LD 1328.2 (macOS 27 beta) produces 4-byte-aligned
# LINKEDIT string pools in proc-macro dylibs at opt-level > 0, but dyld
# requires 8-byte alignment. The rustc-wrapper patches each proc-macro
# dylib immediately after rustc produces it.
[build]
rustc-wrapper = "/Users/olafsson/Developer/tries/2026-06-16-gather-os/mood/src-tauri/rustc-wrapper.sh"
